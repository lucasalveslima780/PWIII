services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: notSecureChangeMe

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
      - PMA_ARBITRARY=1
  web:
    build:
      context: ./containers/fzl-nginx
      dockerfile: Dockerfile
      container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./Meu_Front:/usr/share/nginx/html